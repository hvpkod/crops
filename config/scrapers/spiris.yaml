# config/scrapers/spiris.yaml
# Scraper config for https://www.spiris.se/nyhetsrum/arkiv
#
# Upload this file to config/scrapers/spiris.yaml in the hvpkod/crops repo.
# Referenced from sources.yaml via: scraper: spiris

# only keep article links, not nav/section links

article_list_selector: "table tr"
title_selector: "td:nth-child(2)"
link_selector: "td:nth-child(3) a"
date_selector: "td:nth-child(1)"
link_filter: "^/nyhetsrum/.+"
