# config/tags.yaml — lives in your GitHub config repo.
# Define curated tags and the keywords that trigger them.
# is_highlight: true surfaces articles in the watchlist/highlight view in the app.

tags:
  - name: "AI"
    is_highlight: false
    keywords:
      - "artificial intelligence"
      - "machine learning"
      - "large language model"
      - "LLM"
      - "GPT"
      - "neural network"
      - "deep learning"
      - "OpenAI"
      - "Anthropic"

  - name: "Visa"
    is_highlight: true
    keywords:
      - "visa"
      - "work permit"
      - "residence permit"
      - "immigration"
      - "passport"

  - name: "Climate"
    is_highlight: false
    keywords:
      - "climate change"
      - "global warming"
      - "carbon emissions"
      - "renewable energy"
      - "solar power"
      - "net zero"

  - name: "Security"
    is_highlight: true
    keywords:
      - "data breach"
      - "vulnerability"
      - "ransomware"
      - "malware"
      - "zero-day"
      - "CVE"

banned:
  - "säger"
