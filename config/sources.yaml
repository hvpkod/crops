# config/sources.yaml — lives in your GitHub config repo.
# Add RSS feeds or custom-scraped pages here.
# Changes are picked up automatically on the next fetcher run (no restart needed).

sources:
  # RSS feed example
  - name: "Hacker News"
    url: "https://news.ycombinator.com/rss"
    type: rss
    fetch_frequency_mins: 20
    groups: [tech, english, community]

  # Another RSS feed
  - name: "The Verge"
    url: "https://www.theverge.com/rss/index.xml"
    type: rss
    fetch_frequency_mins: 30
    groups: [tech, english, news]

    # Custom-scraped page — config lives in config/scrapers/spiris.yaml
  - name: "Spiris Nyhetsrum"
    url: "https://www.spiris.se/nyhetsrum/arkiv"
    type: scraped
    fetch_frequency_mins: 60
    groups: [news, swedish, fintech]
    scraper: spiris
